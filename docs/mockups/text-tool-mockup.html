<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Framebase — Text Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&family=Playfair+Display:wght@400;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --app-bg:rgb(12,12,12);--chrome-bg:rgb(18,18,18);--panel-bg:rgb(24,24,24);--panel-bg-2:rgb(32,32,32);
  --hover-bg:rgb(40,40,40);--selected-bg:rgb(30,27,22);
  --border:rgb(32,32,32);--border-strong:rgb(48,48,48);
  --text:rgb(240,240,240);--muted:rgb(160,160,160);--muted2:rgb(100,100,100);
  --accent:rgb(210,160,90);--accent-soft:rgb(50,40,24);--error:rgb(201,126,104);
  --font-ui:'Plus Jakarta Sans',system-ui,sans-serif;
  --radius-md:6px;--radius-lg:8px;--radius-xl:12px;
}
html,body{height:100%;overflow:hidden;background:var(--app-bg);color:var(--text);font-family:var(--font-ui);font-size:12px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}
.workspace{flex:1;overflow:hidden}

/* Canvas */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--app-bg);position:relative;overflow:hidden;width:100%;height:100%}
.canvas-viewport{position:relative;width:820px;height:520px;border-radius:4px;overflow:visible;background:linear-gradient(135deg,#2c3e50 0%,#1a252f 40%,#0f1923 100%);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.canvas-viewport::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 60% at 50% 80%,rgba(34,85,34,.35),transparent),radial-gradient(ellipse 80% 40% at 30% 30%,rgba(60,100,140,.25),transparent),linear-gradient(180deg,#1e3a5f 0%,#2d4a3e 35%,#1a3328 60%,#0f1f18 100%)}
.canvas-viewport::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(155deg,transparent 30%,rgba(15,25,20,.9) 70%);clip-path:polygon(0 60%,8% 45%,18% 55%,30% 30%,42% 48%,55% 20%,68% 40%,78% 25%,88% 42%,100% 35%,100% 100%,0 100%)}

/* Text overlays */
.text-overlay{position:absolute;z-index:10;user-select:none;cursor:move}
.text-overlay.selected{z-index:20}
.text-main{position:relative;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;color:#fff;white-space:nowrap;text-shadow:0 2px 12px rgba(0,0,0,.5);letter-spacing:-.02em}

/* Selection frame — Figma-style dashed border + square handles in accent color */
.sel-frame{position:absolute;inset:-8px;border:1.5px dashed var(--accent);border-radius:2px}
/* Square handles at corners and edge midpoints */
.hdl{position:absolute;width:8px;height:8px;background:var(--accent);border:1.5px solid #fff;border-radius:1.5px;pointer-events:auto;z-index:2}
.hdl.tl{top:-4px;left:-4px;cursor:nwse-resize}
.hdl.tc{top:-4px;left:50%;margin-left:-4px;cursor:ns-resize}
.hdl.tr{top:-4px;right:-4px;cursor:nesw-resize}
.hdl.ml{top:50%;margin-top:-4px;left:-4px;cursor:ew-resize}
.hdl.mr{top:50%;margin-top:-4px;right:-4px;cursor:ew-resize}
.hdl.bl{bottom:-4px;left:-4px;cursor:nesw-resize}
.hdl.bc{bottom:-4px;left:50%;margin-left:-4px;cursor:ns-resize}
.hdl.br{bottom:-4px;right:-4px;cursor:nwse-resize}
/* Rotation handle */
.rot-line{position:absolute;top:-30px;left:50%;width:1.5px;height:22px;background:var(--accent);opacity:.5;margin-left:-.75px}
.rot-handle{position:absolute;top:-40px;left:50%;width:12px;height:12px;margin-left:-6px;border-radius:50%;background:var(--accent);border:1.5px solid #fff;cursor:grab}

/* Tool tabs — floating pill on far right */
.tool-tabs{position:fixed;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;background:var(--chrome-bg);border-radius:var(--radius-xl);border:1px solid var(--border);z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.tool-tab{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);border:none;background:transparent;color:var(--muted2);cursor:pointer;transition:all .12s}
.tool-tab:hover{background:var(--hover-bg);color:var(--text)}
.tool-tab.active{background:var(--accent-soft);color:var(--accent)}
.tool-tab svg{width:16px;height:16px}

/* Panel — floating card to the left of tool tabs */
.panel{position:fixed;right:68px;top:50%;transform:translateY(-50%);width:300px;max-height:calc(100vh - 80px);display:flex;flex-direction:column;background:var(--chrome-bg);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;z-index:99;box-shadow:0 18px 48px rgba(0,0,0,.28),0 4px 12px rgba(0,0,0,.12)}
.panel-hdr{display:flex;height:24px;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--panel-bg-2);padding:0 12px}
.panel-hdr-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:rgba(210,160,90,.72)}
.panel-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.panel-scroll::-webkit-scrollbar{width:5px}
.panel-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>
<div class="app"><div class="workspace">
<!-- CANVAS (full width) -->
<div class="canvas-area"><div class="canvas-viewport">
  <!-- Selected text -->
  <div class="text-overlay selected" style="left:180px;top:190px">
    <div class="text-main" style="font-size:52px">Summer Vibes</div>
    <div class="sel-frame">
      <div class="hdl tl"></div><div class="hdl tc"></div><div class="hdl tr"></div>
      <div class="hdl ml"></div><div class="hdl mr"></div>
      <div class="hdl bl"></div><div class="hdl bc"></div><div class="hdl br"></div>
      <div class="rot-line"></div><div class="rot-handle"></div>
    </div>
  </div>
  <!-- Unselected text -->
  <div class="text-overlay selected" style="right:40px;bottom:50px">
    <div class="text-main" style="font-size:18px;font-weight:500;opacity:.7">2024 Collection</div>
    <div class="sel-frame">
      <div class="hdl tl"></div><div class="hdl tc"></div><div class="hdl tr"></div>
      <div class="hdl ml"></div><div class="hdl mr"></div>
      <div class="hdl bl"></div><div class="hdl bc"></div><div class="hdl br"></div>
    </div>
  </div>
</div></div>
</div>

<!-- TOOL TABS — floating pill, far right -->
<div class="tool-tabs">
  <button class="tool-tab" title="Crop"><i data-lucide="crop"></i></button>
  <button class="tool-tab active" title="Type"><i data-lucide="type"></i></button>
  <button class="tool-tab" title="AI Repaint"><i data-lucide="sparkles"></i></button>
  <button class="tool-tab" title="More"><i data-lucide="more-horizontal"></i></button>
</div>

<!-- RIGHT PANEL — floating card -->
<div class="panel">
<div class="panel-hdr"><span class="panel-hdr-title">Text</span></div>
<div class="panel-scroll">
<!-- Presets -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Presets</span></div>
  <div class="preset-grid">
    <div class="preset active">
      <div class="preset-preview" style="font-size:16px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)">Aa</div>
      <span class="preset-name">Bold White</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:16px;font-weight:400;color:#fff;-webkit-text-stroke:1px rgba(255,255,255,.8);color:transparent">Aa</div>
      <span class="preset-name">Outline</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:14px;font-weight:600;color:#111;background:rgba(255,255,255,.85);padding:2px 6px;border-radius:3px">Aa</div>
      <span class="preset-name">Tag</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:16px;font-weight:700;color:#d2a05a;text-shadow:0 1px 6px rgba(210,160,90,.4)">Aa</div>
      <span class="preset-name">Gold</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:14px;font-family:'Caveat',cursive;font-weight:700;color:#fff">Aa</div>
      <span class="preset-name">Handwrite</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:14px;font-family:'Space Mono',monospace;font-weight:700;color:#0f0;text-shadow:0 0 8px rgba(0,255,0,.3)">Aa</div>
      <span class="preset-name">Terminal</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:16px;font-weight:700;color:#fff;text-shadow:2px 2px 0 #f55b5b,-2px -2px 0 #5b9cf5">Aa</div>
      <span class="preset-name">Glitch</span>
    </div>
    <div class="preset">
      <div class="preset-preview" style="font-size:16px;font-weight:600;color:rgba(255,255,255,.5)">Aa</div>
      <span class="preset-name">Subtle</span>
    </div>
  </div>
</div>
<!-- Text Layers -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Text Layers</span><button class="sec-btn"><i data-lucide="plus"></i></button></div>
  <div style="display:flex;flex-direction:column;gap:4px">
    <div class="layer active" data-layer="0">
    <span class="layer-ico"><i data-lucide="type"></i></span>
    <span class="layer-txt">Summer Vibes</span>
    <button class="layer-del"><i data-lucide="trash-2"></i></button>
  </div>
  <div class="layer active" data-layer="1">
    <span class="layer-ico"><i data-lucide="type"></i></span>
    <span class="layer-txt">2024 Collection</span>
    <button class="layer-del"><i data-lucide="trash-2"></i></button>
  </div>
  </div>
  <!-- Alignment toolbar — visible when 2+ layers selected -->
  <div class="align-bar" id="alignBar">
    <button class="abtn" title="Align left"><i data-lucide="align-horizontal-justify-start"></i></button>
    <button class="abtn" title="Center horizontally"><i data-lucide="align-horizontal-justify-center"></i></button>
    <button class="abtn" title="Align right"><i data-lucide="align-horizontal-justify-end"></i></button>
    <span class="align-sep"></span>
    <button class="abtn" title="Align top"><i data-lucide="align-vertical-justify-start"></i></button>
    <button class="abtn" title="Center vertically"><i data-lucide="align-vertical-justify-center"></i></button>
    <button class="abtn" title="Align bottom"><i data-lucide="align-vertical-justify-end"></i></button>
    <span class="align-sep"></span>
    <button class="abtn" title="Distribute horizontally"><i data-lucide="columns-2"></i></button>
    <button class="abtn" title="Distribute vertically"><i data-lucide="rows-2"></i></button>
  </div>
</div>
<!-- Content -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Content</span></div>
  <textarea class="tinput" placeholder="Enter text…">Summer Vibes</textarea>
  <div class="trow" style="margin-top:6px">
    <button class="tbtn"><i data-lucide="align-left"></i></button>
    <button class="tbtn on"><i data-lucide="align-center"></i></button>
    <button class="tbtn"><i data-lucide="align-right"></i></button>
  </div>
</div>
<!-- Font -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Font</span></div>
  <div class="fsel"><span class="fsel-name">Plus Jakarta Sans</span><span class="fsel-preview" style="font-family:'Plus Jakarta Sans'">Aa</span><span class="fsel-chev"><i data-lucide="chevron-down"></i></span></div>
  <div class="srow"><label>Size</label><input type="range" class="sl" min="12" max="200" value="52"><input type="number" class="ni" value="52" min="12" max="200"></div>
</div>
<!-- Style -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Style</span></div>
  <div class="trow">
    <button class="tbtn on" style="font-weight:700">B</button>
    <button class="tbtn" style="font-style:italic">I</button>
    <button class="tbtn" style="text-decoration:underline">U</button>
  </div>
</div>
<!-- Color & Fill -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Fill</span></div>
  <div class="mrow" style="margin-bottom:8px">
    <button class="mbtn on">Solid</button>
    <button class="mbtn">Gradient</button>
  </div>
  <!-- Solid fill -->
  <div class="swrow">
    <div class="sw active" style="background:#fff"></div>
    <div class="sw" style="background:#111"></div>
    <div class="sw" style="background:#f55b5b"></div>
    <div class="sw" style="background:#f5d45b"></div>
    <div class="sw" style="background:#d2a05a"></div>
    <div class="sw" style="background:#5bf59c"></div>
    <div class="sw" style="background:#f55bb8"></div>
    <div class="sw" style="background:#f5a05b"></div>
    <div class="swc"><i data-lucide="pipette"></i></div>
  </div>
  <!-- Gradient preview (hidden by default, shown when Gradient mode) -->
  <div class="grad-bar" id="gradBar" style="display:none;margin-top:8px">
    <div class="grad-preview" style="height:24px;border-radius:4px;background:linear-gradient(90deg,#fff,#d2a05a);border:1px solid var(--border)"></div>
    <div class="srow"><label>Angle</label><input type="range" class="sl" min="0" max="360" value="90"><input type="number" class="ni" value="90" min="0" max="360"><span style="font-size:10px;color:var(--muted2)">°</span></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:var(--muted2)">From</span><div style="width:20px;height:20px;border-radius:4px;background:#fff;border:1px solid var(--border);cursor:pointer"></div></div>
      <div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:var(--muted2)">To</span><div style="width:20px;height:20px;border-radius:4px;background:#d2a05a;border:1px solid var(--border);cursor:pointer"></div></div>
    </div>
  </div>
  <div class="srow"><label>Opacity</label><input type="range" class="sl" min="0" max="100" value="100"><input type="number" class="ni" value="100" min="0" max="100"><span style="font-size:10px;color:var(--muted2)">%</span></div>
</div>
<!-- Stroke -->
<div class="sec">
  <div class="sec-hdr">
    <span class="sec-label">Stroke</span>
    <button class="swi" onclick="this.classList.toggle('on')"></button>
  </div>
  <div class="stroke-controls" style="display:flex;align-items:center;gap:8px">
    <div style="width:22px;height:22px;border-radius:4px;background:#000;border:1px solid var(--border);cursor:pointer;flex-shrink:0"></div>
    <span style="font-size:10px;color:var(--muted);flex-shrink:0">#000000</span>
    <div style="flex:1"></div>
    <span style="font-size:10px;color:var(--muted2);flex-shrink:0">Width</span>
    <input type="number" class="ni" value="0" min="0" max="20" style="width:40px">
  </div>
</div>
<!-- Background -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Background</span></div>
  <div class="mrow">
    <button class="mbtn on">None</button>
    <button class="mbtn">Solid</button>
    <button class="mbtn">Blur</button>
  </div>
</div>
<!-- Effects -->
<div class="sec">
  <div class="sec-hdr"><span class="sec-label">Shadow</span></div>
  <div style="display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:11px;color:var(--muted)">Enable</span>
    <button class="swi on" onclick="this.classList.toggle('on')"></button>
  </div>
  <div class="shc">
    <div class="shf"><label>X</label><input type="number" class="ni" value="2" min="-50" max="50"></div>
    <div class="shf"><label>Y</label><input type="number" class="ni" value="4" min="-50" max="50"></div>
    <div class="shf"><label>Blur</label><input type="number" class="ni" value="8" min="0" max="100"></div>
    <div class="shf"><label>Spread</label><input type="number" class="ni" value="0" min="0" max="50"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding:0 8px">
    <span style="font-size:10px;color:var(--muted2)">Color</span>
    <div class="sh-color" style="width:22px;height:22px;border-radius:4px;background:rgba(0,0,0,.6);border:1px solid var(--border);cursor:pointer"></div>
    <span style="font-size:10px;color:var(--muted);font-family:var(--font-ui)">#000000</span>
    <div style="flex:1"></div>
    <span style="font-size:10px;color:var(--muted2)">60%</span>
  </div>
</div>
</div>
<div class="panel-footer" style="display:flex;align-items:center;gap:4px;padding:8px 12px;border-top:1px solid var(--border)">
  <button class="fbtn"><i data-lucide="rotate-ccw"></i> Reset</button>
  <button class="fbtn"><i data-lucide="undo-2"></i></button>
  <button class="fbtn"><i data-lucide="redo-2"></i></button>
  <button class="fbtn primary"><i data-lucide="check"></i> Apply</button>
</div>
</div>
</div>
</div>
<style>
/* Panel sections — matching EditorOverlay border-b border-border/60 px-4 py-3 */
.sec{padding:12px 16px;border-bottom:1px solid var(--border)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--muted2)}
.sec-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s}
.sec-btn:hover{background:var(--hover-bg);color:var(--text)}
.sec-btn svg{width:13px;height:13px}
/* Layers */
.layer{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-md);cursor:pointer;transition:background .1s}
.layer:hover{background:var(--hover-bg)}
.layer.active{background:rgba(210,160,90,.06)}
.layer-ico{color:var(--muted2);flex-shrink:0}.layer-ico svg{width:13px;height:13px}
.layer.active .layer-ico{color:var(--accent)}
.layer-txt{flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer.active .layer-txt{color:var(--text)}
.layer-del{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:var(--muted2);cursor:pointer;opacity:0;transition:all .1s;flex-shrink:0}
.layer:hover .layer-del{opacity:1}
.layer-del:hover{background:rgba(245,91,91,.15);color:var(--error)}
.layer-del svg{width:12px;height:12px}
/* Textarea — matching bg-app border border-border rounded-md */
.tinput{width:100%;min-height:56px;padding:8px 10px;background:var(--app-bg);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-family:var(--font-ui);font-size:12px;line-height:1.5;resize:vertical;outline:none;transition:border-color .12s}
.tinput:focus{border-color:var(--accent)}
.tinput::placeholder{color:var(--muted2)}
/* Font selector */
.fsel{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--app-bg);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:border-color .12s}
.fsel:hover{border-color:var(--border-strong)}
.fsel-name{flex:1;font-size:11px;color:var(--text)}
.fsel-preview{font-size:11px;color:var(--muted)}
.fsel-chev{color:var(--muted2)}.fsel-chev svg{width:13px;height:13px}
/* Slider row */
.srow{display:flex;align-items:center;gap:8px;margin-top:8px}
.srow label{font-size:10px;color:var(--muted2);min-width:28px}
.sl{flex:1;-webkit-appearance:none;height:3px;background:var(--panel-bg-2);border-radius:2px;outline:none}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--text);border-radius:50%;cursor:pointer;border:2px solid var(--chrome-bg);transition:background .1s}
.sl::-webkit-slider-thumb:hover{background:var(--accent)}
.ni{width:44px;padding:3px 6px;text-align:center;background:var(--app-bg);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-family:var(--font-ui);font-size:11px;outline:none}
.ni:focus{border-color:var(--accent)}
/* Toggle buttons — matching bg-app rounded-md text-[11px] */
.trow{display:flex;gap:4px}
.tbtn{height:28px;min-width:32px;padding:0 8px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-ui);font-size:11px;font-weight:600;cursor:pointer;transition:all .1s}
.tbtn:hover{background:var(--hover-bg);color:var(--text);border-color:var(--border-strong)}
.tbtn.on{background:var(--selected-bg);color:var(--accent);border-color:rgba(210,160,90,.3)}
.tbtn svg{width:14px;height:14px}
/* Swatches */
.swrow{display:flex;gap:5px;align-items:center}
.sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .1s}
.sw:hover{transform:scale(1.15)}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent)}
.swc{width:22px;height:22px;border-radius:50%;border:1.5px dashed var(--muted2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s}
.swc:hover{border-color:var(--muted)}
.swc svg{width:10px;height:10px;color:var(--muted2)}
/* Mode buttons */
.mrow{display:flex;gap:4px}
.mbtn{flex:1;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .1s;font-family:var(--font-ui)}
.mbtn:hover{background:var(--hover-bg);color:var(--text)}
.mbtn.on{background:var(--selected-bg);color:var(--accent);border-color:rgba(210,160,90,.3)}
/* Switch */
.swi{width:32px;height:18px;border-radius:9px;background:var(--panel-bg-2);cursor:pointer;position:relative;transition:background .15s;border:none}
.swi.on{background:var(--accent)}
.swi::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s}
.swi.on::after{transform:translateX(14px)}
/* Shadow controls */
.shc{display:flex;gap:8px;margin-top:8px;padding:8px;background:var(--app-bg);border-radius:var(--radius-md)}
.shf{flex:1}.shf label{display:block;font-size:10px;color:var(--muted2);margin-bottom:4px}.shf .ni{width:100%}
/* Presets grid */
.preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.preset{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--app-bg);cursor:pointer;transition:all .1s}
.preset:hover{border-color:var(--border-strong);background:var(--hover-bg)}
.preset.active{border-color:var(--accent);background:rgba(210,160,90,.08)}
.preset-preview{height:28px;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui)}
.preset-name{font-size:9px;color:var(--muted2);white-space:nowrap}
.preset.active .preset-name{color:var(--accent)}
/* Alignment toolbar — shown when 2+ layers selected */
.align-bar{display:flex;align-items:center;gap:2px;margin-top:8px;padding:4px 6px;background:var(--app-bg);border-radius:var(--radius-md)}
.align-hint{font-size:10px;color:var(--muted2);margin-right:4px;flex-shrink:0}
.abtn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:var(--muted2);cursor:pointer;transition:all .1s}
.abtn:hover{background:var(--hover-bg);color:var(--text)}
.abtn svg{width:13px;height:13px}
.align-sep{width:1px;height:14px;background:var(--border);margin:0 2px;flex-shrink:0}
/* Footer — matching EditorOverlay footer */
.fbtn{height:30px;display:flex;align-items:center;gap:5px;padding:0 10px;border-radius:var(--radius-md);border:none;background:transparent;color:var(--muted);font-family:var(--font-ui);font-size:11px;font-weight:500;cursor:pointer;transition:all .1s}
.fbtn:hover{background:var(--hover-bg);color:var(--text)}
.fbtn svg{width:14px;height:14px}
.fbtn.primary{background:var(--accent);color:#111;font-weight:600;margin-left:auto;padding:0 16px}
.fbtn.primary:hover{filter:brightness(1.1)}
</style>
<script>
lucide.createIcons();
// Preset selection
document.querySelectorAll('.preset').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));p.classList.add('active')})});
// Swatch selection
document.querySelectorAll('.sw').forEach(s=>{s.addEventListener('click',()=>{document.querySelectorAll('.sw').forEach(x=>x.classList.remove('active'));s.classList.add('active')})});
// Layer selection — Shift+click for multi-select
const alignBar=document.getElementById('alignBar');
function updateAlignBar(){const n=document.querySelectorAll('.layer.active').length;alignBar.style.display=n>=2?'flex':'none'}
document.querySelectorAll('.layer').forEach(l=>{l.addEventListener('click',e=>{
  if(e.shiftKey){l.classList.toggle('active')}
  else{document.querySelectorAll('.layer').forEach(x=>x.classList.remove('active'));l.classList.add('active')}
  updateAlignBar();
})});
updateAlignBar();
// Toggle buttons
document.querySelectorAll('.tbtn').forEach(b=>{b.addEventListener('click',()=>b.classList.toggle('on'))});
// Mode buttons (including fill solid/gradient toggle)
document.querySelectorAll('.mrow').forEach(r=>{r.querySelectorAll('.mbtn').forEach(b=>{b.addEventListener('click',()=>{r.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  // Toggle gradient bar
  const gb=document.getElementById('gradBar');
  if(gb&&r.closest('.sec')&&r.closest('.sec').querySelector('#gradBar')){gb.style.display=b.textContent==='Gradient'?'block':'none'}
})})});
// Tool tabs
document.querySelectorAll('.tool-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tool-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active')})});
// Slider ↔ number sync
document.querySelectorAll('.srow').forEach(r=>{const s=r.querySelector('.sl'),n=r.querySelector('.ni');if(!s||!n)return;s.addEventListener('input',()=>n.value=s.value);n.addEventListener('input',()=>s.value=n.value)});
// Draggable text overlay
(function(){
  const overlay=document.querySelector('.text-overlay.selected');
  let dragging=false,ox=0,oy=0;
  overlay.addEventListener('pointerdown',e=>{
    if(e.target.closest('.hdl,.rot-handle'))return;
    dragging=true;ox=e.clientX-overlay.offsetLeft;oy=e.clientY-overlay.offsetTop;
    overlay.setPointerCapture(e.pointerId);
  });
  overlay.addEventListener('pointermove',e=>{
    if(!dragging)return;
    overlay.style.left=(e.clientX-ox)+'px';overlay.style.top=(e.clientY-oy)+'px';
    overlay.style.right='auto';overlay.style.bottom='auto';
  });
  overlay.addEventListener('pointerup',()=>{dragging=false});
})();
</script>
</body>
</html>
