<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framebase — Editor Crop Mockup v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

  :root {
    --void: #050505;
    --surface: #0a0a0a;
    --panel: rgba(16, 16, 16, 0.92);
    --panel-solid: #101010;
    --brass: #d4a755;
    --brass-dim: rgba(212, 167, 85, 0.15);
    --brass-glow: rgba(212, 167, 85, 0.06);
    --chrome: #8a8a8a;
    --chrome-dim: #555;
    --chrome-faint: #333;
    --white: #e8e8e8;
    --white-pure: #fff;
    --divider: rgba(255, 255, 255, 0.06);
    --handle-size: 24px;
    --handle-weight: 2.5px;
    --edge-handle: 16px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--void);
    color: var(--chrome);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .editor {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
    z-index: 10;
  }

  .topbar-left, .topbar-right {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 180px;
  }

  .topbar-right {
    justify-content: flex-end;
  }

  .topbar-center {
    display: flex;
    align-items: center;
    gap: 2px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
    padding: 3px;
  }

  .btn-text {
    background: none;
    border: none;
    color: var(--chrome);
    font-family: inherit;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    letter-spacing: -0.01em;
  }

  .btn-text:hover {
    color: var(--white);
    background: rgba(255, 255, 255, 0.05);
  }

  .btn-icon {
    background: none;
    border: none;
    color: var(--chrome-dim);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }

  .btn-icon:hover {
    color: var(--white);
    background: rgba(255, 255, 255, 0.06);
  }

  .btn-icon svg {
    width: 16px;
    height: 16px;
    stroke-width: 1.8;
  }

  .tool-tab {
    background: none;
    border: none;
    color: var(--chrome-dim);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 400;
    cursor: pointer;
    padding: 5px 16px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    letter-spacing: -0.01em;
  }

  .tool-tab svg {
    width: 14px;
    height: 14px;
    stroke-width: 1.8;
  }

  .tool-tab:hover {
    color: var(--chrome);
  }

  .tool-tab.active {
    color: var(--brass);
    background: var(--brass-dim);
  }

  .btn-export {
    background: var(--brass);
    color: #1a1400;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: filter 0.15s;
  }

  .btn-export:hover {
    filter: brightness(1.1);
  }

  .separator-v {
    width: 1px;
    height: 20px;
    background: var(--divider);
    margin: 0 4px;
  }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--void);
    overflow: hidden;
  }

  /* Subtle vignette on canvas area */
  .canvas-area::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  }

  .photo-container {
    position: relative;
    width: 820px;
    height: 548px;
    z-index: 1;
  }

  /* Simulated photo */
  .photo {
    width: 100%;
    height: 100%;
    border-radius: 1px;
    background:
      linear-gradient(135deg,
        #2a3a4a 0%,
        #3d5a6e 20%,
        #5a7a8a 35%,
        #8aaa9a 50%,
        #b8c8a0 62%,
        #d4c878 75%,
        #c8965a 88%,
        #7a5a4a 100%
      );
    /* Simulated landscape photo with earthy tones */
  }

  /* ── CROP OVERLAY ── */
  .crop-overlay {
    position: absolute;
    inset: 0;
  }

  /* Dark masks — 4 regions outside crop */
  .mask-top, .mask-bottom, .mask-left, .mask-right {
    position: absolute;
    background: rgba(0, 0, 0, 0.55);
    pointer-events: none;
  }

  .mask-top    { top: 0; left: 0; right: 0; height: 54px; }
  .mask-bottom { bottom: 0; left: 0; right: 0; height: 54px; }
  .mask-left   { top: 54px; bottom: 54px; left: 0; width: 72px; }
  .mask-right  { top: 54px; bottom: 54px; right: 0; width: 72px; }

  /* Crop frame */
  .crop-frame {
    position: absolute;
    top: 54px;
    left: 72px;
    right: 72px;
    bottom: 54px;
    border: 1px solid rgba(255, 255, 255, 0.7);
  }

  /* Rule of thirds */
  .grid-h1, .grid-h2, .grid-v1, .grid-v2 {
    position: absolute;
    background: rgba(255, 255, 255, 0.18);
  }

  .grid-h1, .grid-h2 {
    left: 0;
    right: 0;
    height: 0.5px;
  }

  .grid-v1, .grid-v2 {
    top: 0;
    bottom: 0;
    width: 0.5px;
  }

  .grid-h1 { top: 33.333%; }
  .grid-h2 { top: 66.666%; }
  .grid-v1 { left: 33.333%; }
  .grid-v2 { left: 66.666%; }

  /* L-shaped corner handles */
  .handle-corner {
    position: absolute;
    width: var(--handle-size);
    height: var(--handle-size);
    z-index: 2;
  }

  .handle-corner::before,
  .handle-corner::after {
    content: '';
    position: absolute;
    background: var(--white-pure);
    border-radius: 1px;
  }

  /* Top-left */
  .handle-tl {
    top: -1px;
    left: -1px;
    cursor: nw-resize;
  }
  .handle-tl::before { top: 0; left: 0; width: var(--handle-size); height: var(--handle-weight); }
  .handle-tl::after  { top: 0; left: 0; width: var(--handle-weight); height: var(--handle-size); }

  /* Top-right */
  .handle-tr {
    top: -1px;
    right: -1px;
    cursor: ne-resize;
  }
  .handle-tr::before { top: 0; right: 0; width: var(--handle-size); height: var(--handle-weight); }
  .handle-tr::after  { top: 0; right: 0; width: var(--handle-weight); height: var(--handle-size); }

  /* Bottom-left */
  .handle-bl {
    bottom: -1px;
    left: -1px;
    cursor: sw-resize;
  }
  .handle-bl::before { bottom: 0; left: 0; width: var(--handle-size); height: var(--handle-weight); }
  .handle-bl::after  { bottom: 0; left: 0; width: var(--handle-weight); height: var(--handle-size); }

  /* Bottom-right */
  .handle-br {
    bottom: -1px;
    right: -1px;
    cursor: se-resize;
  }
  .handle-br::before { bottom: 0; right: 0; width: var(--handle-size); height: var(--handle-weight); }
  .handle-br::after  { bottom: 0; right: 0; width: var(--handle-weight); height: var(--handle-size); }

  /* Edge midpoint handles */
  .handle-edge {
    position: absolute;
    z-index: 2;
  }

  .handle-edge::before {
    content: '';
    position: absolute;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 2px;
  }

  .handle-top, .handle-bottom {
    left: 50%;
    transform: translateX(-50%);
    width: var(--edge-handle);
    height: 6px;
    cursor: n-resize;
  }
  .handle-top    { top: -1px; }
  .handle-bottom { bottom: -1px; cursor: s-resize; }
  .handle-top::before, .handle-bottom::before {
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: var(--edge-handle);
    height: var(--handle-weight);
  }

  .handle-left, .handle-right {
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: var(--edge-handle);
    cursor: w-resize;
  }
  .handle-left  { left: -1px; }
  .handle-right { right: -1px; cursor: e-resize; }
  .handle-left::before, .handle-right::before {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: var(--handle-weight);
    height: var(--edge-handle);
  }

  /* ── BOTTOM PANEL ── */
  .bottom-panel {
    flex-shrink: 0;
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--divider);
    padding: 14px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
  }

  /* Aspect ratio row */
  .ratio-row {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .ratio-row::-webkit-scrollbar {
    display: none;
  }

  .ratio-chip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    background: rgba(255, 255, 255, 0.04);
    color: var(--chrome);
    font-family: inherit;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .ratio-chip:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--white);
  }

  .ratio-chip.active {
    background: var(--brass-dim);
    color: var(--brass);
  }

  /* Tiny ratio preview icon */
  .ratio-icon {
    width: 14px;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ratio-icon-rect {
    border: 1.2px solid currentColor;
    border-radius: 1px;
    opacity: 0.6;
  }

  .ratio-chip.active .ratio-icon-rect {
    opacity: 1;
  }

  /* Transform controls row */
  .transform-row {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .transform-group {
    display: flex;
    align-items: center;
    gap: 1px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 6px;
    padding: 2px;
  }

  .transform-btn {
    background: none;
    border: none;
    color: var(--chrome-dim);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
  }

  .transform-btn:hover {
    color: var(--white);
    background: rgba(255, 255, 255, 0.06);
  }

  .transform-btn svg {
    width: 15px;
    height: 15px;
    stroke-width: 1.8;
  }

  .divider-dot {
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--chrome-faint);
    margin: 0 10px;
  }

  /* Angle slider */
  .angle-control {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    max-width: 320px;
    margin-left: 4px;
  }

  .angle-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--chrome-dim);
    flex-shrink: 0;
  }

  .angle-slider-wrap {
    flex: 1;
    position: relative;
    height: 24px;
    display: flex;
    align-items: center;
  }

  .angle-track {
    width: 100%;
    height: 1px;
    background: var(--chrome-faint);
    position: relative;
  }

  .angle-center-mark {
    position: absolute;
    left: 50%;
    top: -3px;
    width: 1px;
    height: 7px;
    background: var(--chrome-dim);
  }

  /* Tick marks */
  .angle-tick {
    position: absolute;
    top: -2px;
    width: 1px;
    height: 5px;
    background: rgba(255,255,255,0.08);
  }
  .angle-tick:nth-child(2) { left: 11.11%; }
  .angle-tick:nth-child(3) { left: 22.22%; }
  .angle-tick:nth-child(4) { left: 33.33%; }
  .angle-tick:nth-child(5) { left: 44.44%; }
  .angle-tick:nth-child(6) { left: 55.55%; }
  .angle-tick:nth-child(7) { left: 66.66%; }
  .angle-tick:nth-child(8) { left: 77.77%; }
  .angle-tick:nth-child(9) { left: 88.88%; }

  .angle-thumb {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--white-pure);
    cursor: grab;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    transition: box-shadow 0.15s;
  }

  .angle-thumb:hover {
    box-shadow: 0 1px 8px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.08);
  }

  .angle-value {
    font-size: 11px;
    font-weight: 400;
    color: var(--white);
    min-width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  /* Right actions group */
  .actions-right {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    padding-left: 16px;
  }

  .btn-reset {
    background: none;
    border: none;
    color: var(--chrome-dim);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 5px;
    transition: all 0.12s;
    letter-spacing: -0.01em;
  }

  .btn-reset:hover {
    color: var(--white);
    background: rgba(255, 255, 255, 0.05);
  }

  .btn-action {
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: filter 0.12s;
  }

  .btn-action svg {
    width: 15px;
    height: 15px;
    stroke-width: 2;
  }

  .btn-apply {
    background: var(--brass);
    color: #1a1400;
  }

  .btn-apply:hover {
    filter: brightness(1.12);
  }

  .btn-cancel-action {
    background: rgba(255, 255, 255, 0.06);
    color: var(--chrome);
  }

  .btn-cancel-action:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--white);
  }

  /* ── Interaction demo: clicking ratio chips ── */
  .ratio-chip:active {
    transform: scale(0.96);
  }

  .tool-tab:active, .transform-btn:active, .btn-icon:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<div class="editor">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="btn-text" id="cancelBtn">Cancel</button>
    </div>

    <div class="topbar-center">
      <button class="tool-tab active" data-tool="crop">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
        Crop
      </button>
      <button class="tool-tab" data-tool="adjust">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>
        Adjust
      </button>
      <button class="tool-tab" data-tool="text">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
        Text
      </button>
    </div>

    <div class="topbar-right">
      <button class="btn-icon" title="Undo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button class="btn-icon" title="Redo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
      </button>
      <div class="separator-v"></div>
      <button class="btn-export">Export</button>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area">
    <div class="photo-container">
      <div class="photo"></div>

      <!-- Crop overlay -->
      <div class="crop-overlay">
        <!-- Masks -->
        <div class="mask-top"></div>
        <div class="mask-bottom"></div>
        <div class="mask-left"></div>
        <div class="mask-right"></div>

        <!-- Crop frame with grid and handles -->
        <div class="crop-frame">
          <!-- Rule of thirds -->
          <div class="grid-h1"></div>
          <div class="grid-h2"></div>
          <div class="grid-v1"></div>
          <div class="grid-v2"></div>

          <!-- Corner L-handles -->
          <div class="handle-corner handle-tl"></div>
          <div class="handle-corner handle-tr"></div>
          <div class="handle-corner handle-bl"></div>
          <div class="handle-corner handle-br"></div>

          <!-- Edge midpoint handles -->
          <div class="handle-edge handle-top"></div>
          <div class="handle-edge handle-bottom"></div>
          <div class="handle-edge handle-left"></div>
          <div class="handle-edge handle-right"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <!-- Aspect ratio chips -->
    <div class="ratio-row" id="ratioRow">
      <button class="ratio-chip active" data-ratio="free">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:11px;height:8px;border-style:dashed"></span></span>
        Free
      </button>
      <button class="ratio-chip" data-ratio="original">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:11px;height:8px"></span></span>
        Original
      </button>
      <button class="ratio-chip" data-ratio="1:1">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:10px;height:10px"></span></span>
        1 : 1
      </button>
      <button class="ratio-chip" data-ratio="3:2">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:12px;height:8px"></span></span>
        3 : 2
      </button>
      <button class="ratio-chip" data-ratio="4:3">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:12px;height:9px"></span></span>
        4 : 3
      </button>
      <button class="ratio-chip" data-ratio="5:4">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:11px;height:9px"></span></span>
        5 : 4
      </button>
      <button class="ratio-chip" data-ratio="16:9">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:14px;height:8px"></span></span>
        16 : 9
      </button>
      <button class="ratio-chip" data-ratio="21:9">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:14px;height:6px"></span></span>
        21 : 9
      </button>
      <button class="ratio-chip" data-ratio="4:5">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:8px;height:10px"></span></span>
        4 : 5
      </button>
      <button class="ratio-chip" data-ratio="9:16">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:7px;height:12px"></span></span>
        9 : 16
      </button>
      <button class="ratio-chip" data-ratio="1.91:1">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:14px;height:7px"></span></span>
        1.91 : 1
      </button>
      <button class="ratio-chip" data-ratio="5:7">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:8px;height:11px"></span></span>
        5 : 7
      </button>
      <button class="ratio-chip" data-ratio="8.5:11">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:9px;height:11px"></span></span>
        8.5 : 11
      </button>
      <button class="ratio-chip" data-ratio="A4">
        <span class="ratio-icon"><span class="ratio-icon-rect" style="width:8px;height:11px"></span></span>
        A4
      </button>
    </div>

    <!-- Transform row -->
    <div class="transform-row">
      <div class="transform-group">
        <button class="transform-btn" title="Rotate Left 90°">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="transform-btn" title="Rotate Right 90°">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>

      <div class="transform-group" style="margin-left: 2px;">
        <button class="transform-btn" title="Flip Horizontal">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><line x1="12" x2="12" y1="20" y2="4"/></svg>
        </button>
        <button class="transform-btn" title="Flip Vertical">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3"/><line x1="4" x2="20" y1="12" y2="12"/></svg>
        </button>
      </div>

      <div class="divider-dot"></div>

      <!-- Angle slider -->
      <div class="angle-control">
        <span class="angle-label">Angle</span>
        <div class="angle-slider-wrap">
          <div class="angle-track">
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-tick"></div>
            <div class="angle-center-mark"></div>
            <div class="angle-thumb" id="angleThumb"></div>
          </div>
        </div>
        <span class="angle-value" id="angleValue">0.0°</span>
      </div>

      <!-- Right actions -->
      <div class="actions-right">
        <button class="btn-reset" id="resetBtn">Reset</button>
        <button class="btn-action btn-cancel-action" title="Cancel crop">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button class="btn-action btn-apply" title="Apply crop">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Ratio chip selection
  document.getElementById('ratioRow').addEventListener('click', (e) => {
    const chip = e.target.closest('.ratio-chip');
    if (!chip) return;
    document.querySelectorAll('.ratio-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });

  // Tool tab switching
  document.querySelectorAll('.tool-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  // Angle thumb drag (simplified demo)
  const thumb = document.getElementById('angleThumb');
  const valueEl = document.getElementById('angleValue');
  let dragging = false;

  thumb.addEventListener('mousedown', (e) => {
    dragging = true;
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const track = thumb.parentElement;
    const rect = track.getBoundingClientRect();
    let pct = (e.clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    thumb.style.left = (pct * 100) + '%';
    const angle = ((pct - 0.5) * 90).toFixed(1);
    valueEl.textContent = angle + '°';

    // Highlight gold when not at center
    if (Math.abs(pct - 0.5) > 0.02) {
      thumb.style.background = 'var(--brass)';
    } else {
      thumb.style.background = 'var(--white-pure)';
    }
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
  });

  // Reset button
  document.getElementById('resetBtn').addEventListener('click', () => {
    thumb.style.left = '50%';
    thumb.style.background = 'var(--white-pure)';
    valueEl.textContent = '0.0°';
    document.querySelectorAll('.ratio-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('[data-ratio="free"]').classList.add('active');
  });
</script>

</body>
</html>
