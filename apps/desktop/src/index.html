<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Workspace</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="sidebar-section">
          <div class="sidebar-copy" id="catalogInfo"></div>
        </section>

        <section class="sidebar-section" id="browseSection">
          <div class="section-label">Browse</div>
          <div id="collectionNav" class="nav-list"></div>
        </section>

        <section class="sidebar-section sidebar-section--footer import-overlay" id="importJobsSection">
          <div class="section-label">Import Jobs</div>
          <div id="importStatus" class="sidebar-copy"></div>
        </section>
      </aside>

      <div class="pane-divider pane-divider--left" id="leftDivider" aria-hidden="true"></div>

      <section class="content-area">
        <div class="toolbar">
          <button class="toolbar-icon" type="button" aria-label="Add">+</button>
          <button class="toolbar-icon" type="button" aria-label="Back">‹</button>
          <button class="toolbar-icon" type="button" aria-label="Forward">›</button>
          <div class="toolbar-title" id="canvasTitle">All Assets</div>
          <div class="toolbar-divider"></div>
          <label class="search-field">
            <span id="searchIcon" class="search-field__icon" aria-hidden="true"></span>
            <input id="searchInput" type="search" placeholder="Search assets..." />
          </label>
          <div class="toolbar-spacer"></div>
          <label class="toolbar-select toolbar-select--compact">
            <select id="filterSelect">
              <option value="all">All</option>
              <option value="matched">Matched</option>
              <option value="unmatched">Unmatched</option>
            </select>
          </label>
          <label class="toolbar-select toolbar-select--compact">
            <select id="sortSelect">
              <option value="name-asc">Name A-Z</option>
              <option value="name-desc">Name Z-A</option>
              <option value="score-desc">Match Score</option>
            </select>
          </label>
          <button id="displayButton" class="toolbar-icon" type="button" aria-label="Display Options">☷</button>
          <div class="density-indicator" id="densityIndicator">M</div>
          <button id="refreshButton" class="toolbar-icon" type="button" aria-label="Refresh">↻</button>
        </div>

        <div id="displayPanel" class="display-panel is-hidden" aria-hidden="true">
          <div class="display-panel__row">
            <label class="display-panel__label" for="viewModeSelect">Layout</label>
            <label class="toolbar-select toolbar-select--compact display-panel__select">
              <select id="viewModeSelect">
                <option value="waterfall">Waterfall</option>
                <option value="justified">Justified</option>
                <option value="grid">Grid</option>
              </select>
            </label>
          </div>
          <div class="display-panel__row">
            <span class="display-panel__label">Thumbnail size</span>
            <div class="display-segment">
              <button id="densitySmallButton" type="button" class="display-segment__button">S</button>
              <button id="densityMediumButton" type="button" class="display-segment__button">M</button>
              <button id="densityLargeButton" type="button" class="display-segment__button">L</button>
            </div>
          </div>
          <div class="display-panel__row">
            <label class="display-toggle">
              <input id="showNameToggle" type="checkbox" checked />
              <span>Show name</span>
            </label>
          </div>
          <div class="display-panel__row">
            <label class="display-panel__label" for="infoModeSelect">Show item info</label>
            <label class="toolbar-select toolbar-select--compact display-panel__select">
              <select id="infoModeSelect">
                <option value="dimensions-size">Dimensions + Size</option>
                <option value="dimensions">Dimensions</option>
                <option value="file-size">File Size</option>
                <option value="none">None</option>
              </select>
            </label>
          </div>
        </div>

        <div class="canvas-meta" id="browserCount">0 items</div>

        <section class="grid-scroller" id="gridScroller">
          <div id="galleryGrid" class="gallery-grid"></div>
          <div class="grid-footer">
            <div id="loadState" class="grid-footer__status">Scroll to load more</div>
            <div id="loadMoreSentinel" class="load-sentinel" aria-hidden="true"></div>
          </div>
        </section>
      </section>

      <div class="pane-divider pane-divider--right" id="rightDivider" aria-hidden="true"></div>

      <aside class="inspector">
        <h2 id="detailTitle" class="inspector-title">Select an asset</h2>
        <div id="detailBody" class="detail-body">
          <p class="empty-state">Choose a thumbnail to inspect its source, metadata, and current linkage.</p>
        </div>
      </aside>
    </main>

    <script src="../node_modules/feather-icons/dist/feather.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
