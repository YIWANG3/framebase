<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collage Templates Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e0e10;
    color: #c8c8cc;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    padding: 24px 32px;
    line-height: 1.4;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    border-bottom: 1px solid #222;
    padding-bottom: 16px;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
  header .stats { font-size: 12px; color: #666; }

  /* Aspect ratio tabs */
  .controls { position: sticky; top: 0; z-index: 100; background: #0e0e10; padding: 12px 0 16px; border-bottom: 1px solid #1a1a1e; }
  .controls-row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .controls-row .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #555; white-space: nowrap; }

  .aspect-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .aspect-tabs button {
    background: #18181c;
    border: 1px solid #2a2a30;
    color: #888;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .aspect-tabs button:hover { background: #222228; color: #bbb; border-color: #3a3a40; }
  .aspect-tabs button.active { background: #e89040; color: #0e0e10; border-color: #e89040; font-weight: 600; }

  .orientation-tabs { display: flex; gap: 4px; }
  .orientation-tabs button {
    background: #18181c;
    border: 1px solid #2a2a30;
    color: #888;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .orientation-tabs button:hover { background: #222228; color: #bbb; }
  .orientation-tabs button.active { background: #555; color: #fff; border-color: #666; }

  /* Count groups */
  .count-group { margin-bottom: 36px; }
  .count-group h2 {
    font-size: 13px;
    font-weight: 600;
    color: #e89040;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count-group h2 .badge {
    font-size: 10px;
    font-weight: 500;
    color: #777;
    background: #1c1c20;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .templates { display: flex; flex-wrap: wrap; gap: 16px; }

  .tmpl-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.12s;
  }
  .tmpl-card:hover { transform: scale(1.04); }

  .tmpl-box {
    position: relative;
    background: #16161a;
    border: 1px solid #2a2a30;
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .tmpl-card:hover .tmpl-box { border-color: #e89040; }

  .tmpl-box .cell {
    position: absolute;
    background: rgba(232, 144, 64, 0.06);
    border: 1px solid rgba(232, 144, 64, 0.15);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 500;
    color: #555;
    transition: background 0.15s;
  }
  .tmpl-card:hover .cell { background: rgba(232, 144, 64, 0.10); border-color: rgba(232, 144, 64, 0.25); }

  .tmpl-card .tmpl-label {
    font-size: 10px;
    color: #666;
    max-width: 120px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tmpl-card .tmpl-id {
    font-size: 9px;
    color: #444;
    font-family: "SF Mono", monospace;
  }

  /* Summary table at top */
  .summary {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .summary-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    background: #18181c;
    border: 1px solid #2a2a30;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .summary-chip:hover { background: #222228; color: #bbb; border-color: #3a3a40; }
  .summary-chip .num { color: #e89040; font-weight: 600; }

  /* View all aspect ratios side by side */
  .multi-aspect { margin-top: 8px; }
  .multi-aspect-row {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .multi-aspect-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .multi-aspect-item .ar-label {
    font-size: 9px;
    color: #555;
    font-weight: 500;
  }
</style>
</head>

    { id: "11-t3-m4-b4", name: "3+4+4", cells: [{x:0,y:0,w:1/3,h:1/3},{x:1/3,y:0,w:1/3,h:1/3},{x:2/3,y:0,w:1/3,h:1/3},{x:0,y:1/3,w:.25,h:1/3},{x:.25,y:1/3,w:.25,h:1/3},{x:.5,y:1/3,w:.25,h:1/3},{x:.75,y:1/3,w:.25,h:1/3},{x:0,y:2/3,w:.25,h:1/3},{x:.25,y:2/3,w:.25,h:1/3},{x:.5,y:2/3,w:.25,h:1/3},{x:.75,y:2/3,w:.25,h:1/3}] },
    { id: "11-t4-m4-b3", name: "4+4+3", cells: [{x:0,y:0,w:.25,h:1/3},{x:.25,y:0,w:.25,h:1/3},{x:.5,y:0,w:.25,h:1/3},{x:.75,y:0,w:.25,h:1/3},{x:0,y:1/3,w:.25,h:1/3},{x:.25,y:1/3,w:.25,h:1/3},{x:.5,y:1/3,w:.25,h:1/3},{x:.75,y:1/3,w:.25,h:1/3},{x:0,y:2/3,w:1/3,h:1/3},{x:1/3,y:2/3,w:1/3,h:1/3},{x:2/3,y:2/3,w:1/3,h:1/3}] },

};

// ─── State ───────────────────────────────────────────────
let currentAspect = 3/4;
let currentView = "single"; // single | compare

// ─── Stats ───────────────────────────────────────────────
function updateStats() {
  let total = 0;
  for (const k of Object.keys(TEMPLATES)) total += TEMPLATES[k].length;
  document.getElementById("stats").textContent = `${Object.keys(TEMPLATES).length} image counts · ${total} total layouts · ${ASPECTS.length} aspect ratios`;
}

// ─── Summary chips ───────────────────────────────────────
function renderSummary() {
  const el = document.getElementById("summary");
  el.innerHTML = "";
  for (const [count, tmpls] of Object.entries(TEMPLATES)) {
    const chip = document.createElement("span");
    chip.className = "summary-chip";
    chip.innerHTML = `<span class="num">${count}</span> images · ${tmpls.length} layouts`;
    chip.onclick = () => {
      document.getElementById(`group-${count}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    };
    el.appendChild(chip);
  }
}

// ─── Render single aspect view ───────────────────────────
function renderSingle() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  const BASE = 140;
  const aspect = currentAspect;
  const boxW = aspect >= 1 ? BASE : Math.round(BASE * aspect);
  const boxH = aspect >= 1 ? Math.round(BASE / aspect) : BASE;
  const GAP = 2;

  for (const [count, tmpls] of Object.entries(TEMPLATES)) {
    const group = document.createElement("div");
    group.className = "count-group";
    group.id = `group-${count}`;

    const h2 = document.createElement("h2");
    h2.innerHTML = `${count} Images <span class="badge">${tmpls.length} layouts</span>`;
    group.appendChild(h2);

    const container = document.createElement("div");
    container.className = "templates";

    for (const tmpl of tmpls) {
      const card = document.createElement("div");
      card.className = "tmpl-card";

      const box = document.createElement("div");
      box.className = "tmpl-box";
      box.style.width = boxW + "px";
      box.style.height = boxH + "px";

      tmpl.cells.forEach((cell, ci) => {
        const div = document.createElement("div");
        div.className = "cell";
        const isLeft = cell.x === 0;
        const isRight = Math.abs(cell.x + cell.w - 1) < 0.001;
        const isTop = cell.y === 0;
        const isBottom = Math.abs(cell.y + cell.h - 1) < 0.001;
        const hg = GAP / 2;
        const x = cell.x * boxW + (isLeft ? 0 : hg);
        const y = cell.y * boxH + (isTop ? 0 : hg);
        const w = cell.w * boxW - (isLeft ? 0 : hg) - (isRight ? 0 : hg);
        const h = cell.h * boxH - (isTop ? 0 : hg) - (isBottom ? 0 : hg);
        div.style.left = x + "px";
        div.style.top = y + "px";
        div.style.width = Math.max(w, 1) + "px";
        div.style.height = Math.max(h, 1) + "px";
        div.textContent = ci + 1;
        box.appendChild(div);
      });

      const label = document.createElement("div");
      label.className = "tmpl-label";
      label.textContent = tmpl.name;
      label.title = tmpl.id;

      const idLabel = document.createElement("div");
      idLabel.className = "tmpl-id";
      idLabel.textContent = tmpl.id;

      card.appendChild(box);
      card.appendChild(label);
      card.appendChild(idLabel);
      container.appendChild(card);
    }

    group.appendChild(container);
    root.appendChild(group);
  }
}

// ─── Render compare view (all aspects side by side) ──────
function renderCompare() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  const BASE = 60;
  const GAP = 1;

  for (const [count, tmpls] of Object.entries(TEMPLATES)) {
    const group = document.createElement("div");
    group.className = "count-group";
    group.id = `group-${count}`;

    const h2 = document.createElement("h2");
    h2.innerHTML = `${count} Images <span class="badge">${tmpls.length} layouts</span>`;
    group.appendChild(h2);

    for (const tmpl of tmpls) {
      const row = document.createElement("div");
      row.style.cssText = "display:flex; align-items:flex-end; gap:12px; margin-bottom:16px; padding:8px 0; border-bottom:1px solid #1a1a1e;";

      // Template name
      const nameEl = document.createElement("div");
      nameEl.style.cssText = "width:100px; flex-shrink:0;";
      nameEl.innerHTML = `<div style="font-size:11px;color:#bbb;">${tmpl.name}</div><div style="font-size:9px;color:#444;font-family:monospace;">${tmpl.id}</div>`;
      row.appendChild(nameEl);

      for (const asp of ASPECTS) {
        const item = document.createElement("div");
        item.className = "multi-aspect-item";

        const boxW = asp.value >= 1 ? BASE : Math.round(BASE * asp.value);
        const boxH = asp.value >= 1 ? Math.round(BASE / asp.value) : BASE;

        const box = document.createElement("div");
        box.className = "tmpl-box";
        box.style.width = boxW + "px";
        box.style.height = boxH + "px";

        tmpl.cells.forEach((cell, ci) => {
          const div = document.createElement("div");
          div.className = "cell";
          const isLeft = cell.x === 0;
          const isRight = Math.abs(cell.x + cell.w - 1) < 0.001;
          const isTop = cell.y === 0;
          const isBottom = Math.abs(cell.y + cell.h - 1) < 0.001;
          const hg = GAP / 2;
          const x = cell.x * boxW + (isLeft ? 0 : hg);
          const y = cell.y * boxH + (isTop ? 0 : hg);
          const w = cell.w * boxW - (isLeft ? 0 : hg) - (isRight ? 0 : hg);
          const h = cell.h * boxH - (isTop ? 0 : hg) - (isBottom ? 0 : hg);
          div.style.left = x + "px";
          div.style.top = y + "px";
          div.style.width = Math.max(w, 1) + "px";
          div.style.height = Math.max(h, 1) + "px";
          div.style.fontSize = "7px";
          div.textContent = ci + 1;
          box.appendChild(div);
        });

        const arLabel = document.createElement("div");
        arLabel.className = "ar-label";
        arLabel.textContent = asp.label;

        item.appendChild(box);
        item.appendChild(arLabel);
        row.appendChild(item);
      }

      group.appendChild(row);
    }

    root.appendChild(group);
  }
}

// ─── View switcher ───────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("view-single").classList.toggle("active", v === "single");
  document.getElementById("view-compare").classList.toggle("active", v === "compare");
  render();
}

function render() {
  if (currentView === "compare") {
    renderCompare();
  } else {
    renderSingle();
  }
}

// ─── Aspect ratio tabs ──────────────────────────────────
function buildTabs() {
  const tabsEl = document.getElementById("aspect-tabs");
  tabsEl.innerHTML = "";
  ASPECTS.forEach((a) => {
    const btn = document.createElement("button");
    btn.textContent = a.label;
    btn.onclick = () => {
      currentAspect = a.value;
      document.querySelectorAll("#aspect-tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    if (a.value === currentAspect) btn.classList.add("active");
    tabsEl.appendChild(btn);
  });
}

// ─── Init ────────────────────────────────────────────────
buildTabs();
updateStats();
renderSummary();
render();
</script>
